name: CI

on:
  push:
  pull_request:

jobs:
  external-server:
    name: External Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: python -m build

  plugin-python39:
    name: Plugin Python 3.9 compatibility
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - run: python -m pip install "pytest>=8,<9"
      - run: python -m compileall -q sd_plugin/substance_designer_mcp_plugin
      - name: Plugin-only tests
        run: >-
          python -m pytest
          tests/unit/test_registry.py
          tests/unit/test_validators.py
          tests/unit/test_dispatcher.py
          tests/unit/test_compatibility.py
          tests/unit/test_services.py
          tests/unit/test_command_executor.py
          tests/unit/test_plugin_lifecycle.py
  release-artifacts:
    name: Build and verify release artifacts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m build
      - run: python scripts/build_plugin.py --output artifacts
      - run: >-
          python scripts/verify_release.py
          --plugin-archive artifacts/substance_designer_mcp_plugin-1.1.0.zip
